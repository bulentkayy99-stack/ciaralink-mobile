<!DOCTYPE html>
<html lang="en">
<head>
  <script src="capacitor-bridge.js"></script>
  <script src="native-init.js" defer></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CiaraLink — Set your password</title>
<script src="./env.local.js?v=20260628"></script>
<script src="/vendor/supabase.js"></script>
<script src="./supabase-client.js?v=20260628c"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:linear-gradient(160deg,#0b6b60,#16b8a6);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#1f2d2a}
  .card{background:#fff;border-radius:18px;max-width:420px;width:100%;padding:30px 28px;box-shadow:0 20px 60px rgba(0,0,0,.18)}
  h1{font-size:21px;margin:0 0 4px}
  p.h{color:#5f726d;font-size:13.5px;margin:0 0 20px}
  label{display:block;font-size:12.5px;font-weight:600;margin:14px 0 5px}
  input{width:100%;padding:11px 13px;border:1px solid #e3ece9;border-radius:10px;font-size:14px}
  .btn{width:100%;margin-top:20px;border:0;border-radius:11px;padding:12px;font-size:15px;font-weight:600;background:#16b8a6;color:#fff;cursor:pointer}
  .btn:disabled{background:#b7d8d2;cursor:not-allowed}
  .msg{border-radius:10px;padding:10px 12px;font-size:13px;margin-top:14px;display:none}
  .err{background:#fbe9ed;color:#b0314f}
  .ok{background:#e9f6ef;color:#1e7a52}
  .hint{font-size:12px;color:#5f726d;margin-top:5px}
</style>
</head>
<body>
<div class="card">
  <h1>Set your password</h1>
  <p class="h">Welcome to CiaraLink. Choose a password to finish setting up your account.</p>
  <label>New password</label>
  <input id="pw1" type="password" placeholder="At least 8 characters" />
  <label>Confirm password</label>
  <input id="pw2" type="password" placeholder="Re-enter password" />
  <div class="hint">Use 8+ characters with a mix of letters and numbers.</div>
  <div class="msg err" id="err"></div>
  <div class="msg ok" id="ok"></div>
  <button class="btn" id="save">Save &amp; continue</button>
</div>
<script>
(function(){
  var A = window.CiaraLinkAuth || {};
  var el = function(id){ return document.getElementById(id); };

  async function guard(){
    if(!window.isSupabaseConfigured || !window.isSupabaseConfigured()){ window.location.href='signin.html'; return; }
    // Arriving from a password-reset email: Supabase puts a recovery session in
    // the URL hash (#access_token=...&type=recovery). supabase-js consumes it
    // asynchronously (detectSessionInUrl is on by default), so wait for that
    // session before deciding the user is signed out.
    var hash = window.location.hash || '';
    if(hash.indexOf('access_token') !== -1 || hash.indexOf('type=recovery') !== -1){
      var client = A.getSupabaseClient();
      for(var i=0;i<30;i++){
        var s = await client.auth.getSession();
        if(s && s.data && s.data.session){ return; }
        await new Promise(function(r){ setTimeout(r,100); });
      }
    }
    var who = await A.getCurrentUser();
    if(!who || !who.user){ window.location.href='signin.html'; }
  }
  guard();

  async function dest(){
    try{
      var who = await A.getCurrentUser();
      var client = A.getSupabaseClient();
      var r = await client.from('organisation_members').select('role').eq('user_id', who.user.id).eq('status','active').limit(1).single();
      return A.getDashboardForRole(r.data && r.data.role);
    }catch(e){ return 'Index.dc.html'; }
  }

  el('save').addEventListener('click', async function(){
    var p1=el('pw1').value, p2=el('pw2').value;
    el('err').style.display='none'; el('ok').style.display='none';
    if(p1.length<8){ el('err').textContent='Password must be at least 8 characters.'; el('err').style.display='block'; return; }
    if(p1!==p2){ el('err').textContent='Passwords do not match.'; el('err').style.display='block'; return; }
    var b=el('save'); b.disabled=true; b.textContent='Saving…';
    var r = await A.changeOwnPassword(p1);
    if(r.ok){
      el('ok').textContent='Done! Taking you to your dashboard…'; el('ok').style.display='block';
      var d = await dest();
      setTimeout(function(){ window.location.href=d; }, 900);
    } else {
      b.disabled=false; b.textContent='Save & continue';
      el('err').textContent = r.error || 'Could not save password.'; el('err').style.display='block';
    }
  });
})();
</script>
</body>
</html>
