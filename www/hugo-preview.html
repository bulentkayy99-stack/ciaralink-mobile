<!DOCTYPE html>
<html>
<head>
  <script src="capacitor-bridge.js"></script>
  <script src="native-init.js" defer></script>
<meta charset="utf-8">
<title>Hugo Preview</title>
<style>
  body { margin:0; background:#eaeeec; min-height:100vh; font-family:'Hanken Grotesk',sans-serif; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:32px; }
  h2 { color:#0c2622; font-size:22px; margin:0; }
  p { color:#6c7f79; margin:0; font-size:14px; }
  .row { display:flex; gap:40px; align-items:flex-end; }
  .col { text-align:center; }
  .label { font-size:12px; color:#9aa8a3; margin-top:8px; font-weight:700; }
</style>
</head>
<body>
<h2>Hugo — CiaraLink Owl Assistant</h2>
<p>Click the owl in the bottom-right corner to open the chat</p>
<div class="row">
  <div class="col"><hugo-owl mood="happy" size="120" palette="mint"></hugo-owl><div class="label">happy (default)</div></div>
  <div class="col"><hugo-owl mood="wave" size="120" palette="mint"></hugo-owl><div class="label">wave (greeting)</div></div>
  <div class="col"><hugo-owl mood="curious" size="120" palette="mint"></hugo-owl><div class="label">curious (thinking)</div></div>
  <div class="col"><hugo-owl mood="celebrate" size="120" palette="mint"></hugo-owl><div class="label">celebrate (done!)</div></div>
  <div class="col"><hugo-owl mood="love" size="120" palette="mint"></hugo-owl><div class="label">love (thanks)</div></div>
</div>
<script src="hugo-owl.js"></script>
<script src="hugo.js"></script>
</body>
</html>
