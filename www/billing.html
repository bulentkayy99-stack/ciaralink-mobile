<!DOCTYPE html>
<html lang="en">
<head>
  <script src="capacitor-bridge.js"></script>
  <script src="native-init.js" defer></script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Billing &amp; plan — CiaraLink</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>if(typeof window.ENV==='undefined'){window.ENV={SUPABASE_URL:'',SUPABASE_ANON_KEY:''};}</script>
<script src="./env.local.js"></script>
<script src="/vendor/supabase.js"></script>
<script src="./supabase-client.js?v=20260630"></script>
<script src="./stripe-pricing.js?v=20260630"></script>
<style>
:root{--teal:#16b8a6;--teal-2:#11d4be;--teal-d:#0b6b60;--ink-2:#0c2622;--ink-3:#091815;--paper:#f5f8f7;--tx:#14302b;--tx-2:#52716b;--tx-3:#8a9a94;--line:#e2eae7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:radial-gradient(900px 500px at 80% -10%,#e7f6f2,transparent 60%),var(--paper);color:var(--tx);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--teal-d);text-decoration:none;font-weight:700}
a:hover{text-decoration:underline}
.nav{height:64px;display:flex;align-items:center;gap:11px;max-width:760px;margin:0 auto;width:100%;padding:0 24px}
.logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(150deg,var(--teal-2),var(--teal-d));display:flex;align-items:center;justify-content:center}
.bn{font-size:18px;font-weight:900;letter-spacing:-.03em}
.nav .sp{margin-left:auto;font-size:14px;color:var(--tx-2);font-weight:600}
.wrap{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:30px 24px 60px}
.card{width:100%;max-width:560px;background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 30px 80px -40px rgba(8,40,36,.3);overflow:hidden}
.card-h{padding:26px 28px 0}
.eyebrow{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--teal-d)}
.card-h h1{font-size:26px;font-weight:900;letter-spacing:-.03em;margin-top:10px}
.body{padding:22px 28px 28px}
.skeleton{height:90px;border-radius:14px;background:linear-gradient(90deg,#eef3f1,#f6f9f8,#eef3f1);background-size:200% 100%;animation:sh 1.3s linear infinite}
@keyframes sh{to{background-position:-200% 0}}
.status{display:flex;align-items:center;gap:12px;padding:16px 18px;border-radius:14px;border:1px solid var(--line);margin-bottom:18px}
.dot{width:11px;height:11px;border-radius:50%;flex:0 0 11px}
.status .t{font-size:16px;font-weight:800}
.status .s{font-size:13px;color:var(--tx-2);font-weight:600;margin-top:2px}
.ok{background:rgba(22,184,166,.08);border-color:rgba(22,184,166,.3)}.ok .dot{background:var(--teal)}
.warn{background:rgba(232,167,42,.1);border-color:rgba(232,167,42,.35)}.warn .dot{background:#e8a72a}
.none{background:#f7faf9}.none .dot{background:#b6c4bf}
.rows{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:20px}
.row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line);font-size:14px}
.row:last-child{border-bottom:none}
.row .k{color:var(--tx-2);font-weight:600}.row .v{font-weight:800}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:50px;padding:0 22px;border-radius:13px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;border:none;width:100%}
.btn-primary{background:linear-gradient(150deg,var(--teal-2),var(--teal-d));color:#fff;box-shadow:0 14px 30px -12px rgba(14,147,132,.7)}
.btn-light{background:#fff;color:var(--tx);border:1px solid var(--line);margin-top:10px}
.btn-light:not(:first-of-type){margin-top:10px}
.btn.loading{opacity:.75;pointer-events:none}
.spin{width:16px;height:16px;border-radius:50%;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;animation:sp .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
.btn-light .spin{border-color:rgba(11,107,96,.25);border-top-color:var(--teal-d)}
@keyframes sp{to{transform:rotate(360deg)}}
.note{font-size:12.5px;color:var(--tx-3);margin-top:16px;line-height:1.5;text-align:center}
.gate{margin-top:18px;padding:14px 16px;border-radius:13px;border:1px dashed #b8d4ce;background:#f4faf8;font-size:13.5px;color:var(--tx-2);font-weight:600;line-height:1.5}
.gate b{color:var(--tx)}
</style>
</head>
<body>
<div class="nav">
  <span class="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="8" cy="8" r="3.2" stroke="#fff" stroke-width="2"/><circle cx="16" cy="16" r="3.2" stroke="#fff" stroke-width="2"/><path d="M10.3 10.3l3.4 3.4" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></span>
  <span class="bn">CiaraLink</span>
  <a class="sp" href="./pricing.html">View plans →</a>
</div>

<div class="wrap">
  <div class="card">
    <div class="card-h">
      <div class="eyebrow">Billing &amp; plan</div>
      <h1>Your subscription</h1>
    </div>
    <div class="body" id="body">
      <div class="skeleton"></div>
    </div>
  </div>
</div>

<script>
function esc(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
function fmtDate(iso){ if(!iso) return '—'; try{ return new Date(iso).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});}catch(e){return iso;} }
function titleCase(s){ return (s||'').replace(/[_-]/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();}); }

function render(html){ document.getElementById('body').innerHTML = html; }

function viewSignedOut(){
  render(
    '<div class="status none"><span class="dot"></span><div><div class="t">Not signed in</div>'+
    '<div class="s">Sign in to view your plan and manage billing.</div></div></div>'+
    '<a class="btn btn-primary" href="./signin.html">Sign in</a>'+
    '<a class="btn btn-light" href="./pricing.html">See plans</a>'+
    '<div class="note">Your subscription is private to your account and protected by row-level security.</div>'
  );
}
function viewNotConfigured(){
  render('<div class="status warn"><span class="dot"></span><div><div class="t">Billing not available here</div>'+
    '<div class="s">This environment isn’t connected to billing.</div></div></div>'+
    '<a class="btn btn-light" href="./pricing.html">See plans</a>');
}
function viewNoPlan(){
  render(
    '<div class="status none"><span class="dot"></span><div><div class="t">No active plan</div>'+
    '<div class="s">You’re not subscribed yet. Start a 7-day free trial anytime.</div></div></div>'+
    '<a class="btn btn-primary" href="./pricing.html">Choose a plan</a>'+
    '<div class="gate">Paid features are <b>locked</b> until you start a plan. Your data stays safe — you just won’t see premium tools until you subscribe.</div>'
  );
}
function viewPlan(sub, active, planLabel){
  var st = (sub.status||'').toLowerCase();
  var cls = st==='active'||st==='trialing' ? 'ok' : (st==='past_due' ? 'warn' : 'none');
  var label = st==='trialing' ? 'Free trial active' : st==='active' ? 'Active subscription' : st==='past_due' ? 'Payment needs attention' : titleCase(st)||'Subscription';
  var sub2 = st==='trialing' ? 'No charge until your trial ends.' : st==='past_due' ? 'Update your card to keep access.' : 'Managed securely via Stripe.';
  var plan = planLabel ? esc(planLabel) : (sub.plan ? esc(sub.plan) : (sub.price_id ? esc(sub.price_id) : '—'));
  var gate = active
    ? '<div class="gate">✅ Paid features are <b>unlocked</b> for your account.</div>'
    : '<div class="gate">Paid features are <b>locked</b> while your plan is '+esc(st||'inactive')+'.</div>';
  var portalBtn = sub.stripe_customer_id
    ? '<button class="btn btn-light" id="portalBtn" type="button">Manage billing in Stripe</button>'
    : '';
  render(
    '<div class="status '+cls+'"><span class="dot"></span><div><div class="t">'+esc(label)+'</div>'+
    '<div class="s">'+esc(sub2)+'</div></div></div>'+
    '<div class="rows">'+
      '<div class="row"><span class="k">Plan</span><span class="v">'+plan+'</span></div>'+
      '<div class="row"><span class="k">Status</span><span class="v">'+esc(titleCase(st))+'</span></div>'+
      '<div class="row"><span class="k">Renews / ends</span><span class="v">'+esc(fmtDate(sub.current_period_end))+'</span></div>'+
      '<div class="row"><span class="k">Billing</span><span class="v">Stripe</span></div>'+
    '</div>'+
    portalBtn+
    '<a class="btn btn-primary" href="./pricing.html">Change plan</a>'+
    gate+
    '<div class="note">NDIS claim price caps are separate — see <a href="./Price Guide.dc.html">NDIS Price Guide</a> in your dashboard.</div>'
  );
  var pb = document.getElementById('portalBtn');
  if(pb){
    pb.addEventListener('click', function(){
      if(pb.classList.contains('loading')) return;
      pb.classList.add('loading');
      pb.innerHTML = '<span class="spin"></span>Opening Stripe…';
      (window.CiaraLinkStripe && window.CiaraLinkStripe.openBillingPortal
        ? window.CiaraLinkStripe.openBillingPortal()
        : Promise.resolve({ ok:false })
      ).then(function(res){
        if(!res.ok){
          pb.classList.remove('loading');
          pb.textContent = res.message || 'Could not open billing portal — try again';
        }
      });
    });
  }
}

(async function(){
  // wait briefly for supabase-client.js to initialise
  var tries=0;
  while(!(window.CiaraLinkAuth && window.CiaraLinkAuth.loadCurrentSubscription) && tries<25){ await new Promise(function(r){setTimeout(r,80);}); tries++; }
  var A = window.CiaraLinkAuth;
  if(!A || !A.isSupabaseConfigured || !A.isSupabaseConfigured()){ return viewNotConfigured(); }
  var client = A.getSupabaseClient && A.getSupabaseClient();
  var user=null;
  try{ var r = await client.auth.getUser(); user = r && r.data && r.data.user; }catch(e){}
  if(!user){ return viewSignedOut(); }
  var res = await A.loadCurrentSubscription();
  if(!res.ok){ return viewNoPlan(); }
  if(!res.subscription){ return viewNoPlan(); }
  var planLabel = null;
  if(A.resolvePlatformPlanLabel && res.subscription.price_id){
    planLabel = await A.resolvePlatformPlanLabel(res.subscription.price_id);
  }
  if(!planLabel && window.CiaraLinkStripe && res.subscription.price_id){
    planLabel = await window.CiaraLinkStripe.planLabelForPriceId(res.subscription.price_id);
  }
  viewPlan(res.subscription, res.active, planLabel);
})();
</script>
</body>
</html>
